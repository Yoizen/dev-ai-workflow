name: GA

on:
  push:
    branches: [main]
    paths:
      - 'ywai/ga/**'
      - '.github/workflows/ga.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ywai/ga/**'
      - '.github/workflows/ga.yml'
  workflow_dispatch:

jobs:
  test:
    name: GA test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        run: |
          cd ywai/ga
          GOCACHE=/tmp/go-build-cache go test ./...
          go vet ./...

      - name: Build GA
        run: |
          cd ywai/ga
          go build ./cmd/ga
