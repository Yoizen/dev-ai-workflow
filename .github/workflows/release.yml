name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        run: |
          # Update ywai/ga/package.json with the tag version
          if [[ -f "ywai/ga/package.json" ]]; then
            # Remove 'v' prefix if present
            VERSION="${GITHUB_REF_NAME#v}"
            # Update package.json version
            jq --arg version "$VERSION" '.version = $version' ywai/ga/package.json > ywai/ga/package.json.tmp
            mv ywai/ga/package.json.tmp ywai/ga/package.json
            echo "Updated ywai/ga/package.json to version $VERSION"
            
            # Commit the version update
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add ywai/ga/package.json
            git diff --staged --quiet || git commit -m "chore: update package.json to ${VERSION}"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Go binaries
        run: |
          cd ywai/setup
          make clean
          make build-all
          
          # List built binaries
          ls -la dist/

      - name: Build GA binaries
        run: |
          cd ywai/ga
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for platform in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64 windows-amd64; do
            GOOS="${platform%-*}"
            GOARCH="${platform#*-}"
            EXT=""
            if [[ "$GOOS" == "windows" ]]; then
              EXT=".exe"
            fi
            OUTPUT="dist/ga-${platform}${EXT}"
            GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -ldflags="-s -w -X=github.com/yoizen/ga/internal/version.Version=${VERSION} -X=github.com/yoizen/ga/internal/version.Commit=${COMMIT} -X=github.com/yoizen/ga/internal/version.Date=${BUILD_DATE}" \
              -o "$OUTPUT" ./cmd/ga
          done
          ls -la dist/

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p')
          if [[ -n "$PREV_TAG" ]]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges | head -30)
          fi
          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changes }}

            ---

            ### Installation

            **macOS / Linux**
            ```bash
            curl -sSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | bash
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://github.com/${{ github.repository }}/releases/latest/download/install.ps1 | iex
            ```

            > The installer downloads the binary, adds it to PATH, and launches the interactive wizard automatically.

          files: |
            ywai/setup/install.sh
            ywai/setup/install.ps1
            ywai/setup/dist/*
            ywai/ga/dist/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
