name: Release

on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    working-directory: ywai

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: ywai/go.sum

      - name: Prepare embedded data
        run: bash scripts/prepare-embedded.sh

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
          workdir: ywai
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
