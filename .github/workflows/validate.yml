name: Validate

on:
  push:
    branches:
      - main
      - exp
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - exp

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck — setup scripts
        run: |
          find ywai -name '*.sh' -not -path '*/node_modules/*' -print0 \
            | xargs -0 shellcheck -S warning

      - name: ShellCheck — test scripts
        run: |
          shellcheck -S warning \
            ywai/tests/run-all-tests.sh \
            ywai/tests/test-e2e.sh \
            ywai/tests/test-skills.sh \
            ywai/tests/test-syntax.sh

  bash-syntax:
    name: Bash Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check bash syntax — all .sh files
        run: |
          failed=0
          while IFS= read -r -d '' file; do
            if ! bash -n "$file" 2>/dev/null; then
              echo "SYNTAX ERROR: $file"
              bash -n "$file"
              failed=1
            fi
          done < <(find ywai -name '*.sh' -not -path '*/node_modules/*' -print0)
          exit $failed

  powershell-syntax:
    name: PowerShell Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          sudo apt-get update -q
          sudo apt-get install -y powershell

      - name: Check PowerShell syntax — all .ps1 files
        run: |
          failed=0
          while IFS= read -r -d '' file; do
            if ! pwsh -NoProfile -NonInteractive -Command "
              \$errors = \$null
              [System.Management.Automation.Language.Parser]::ParseFile('$file', [ref]\$null, [ref]\$errors) | Out-Null
              if (\$errors.Count -gt 0) {
                \$errors | ForEach-Object { Write-Error \$_.Message }
                exit 1
              }
            " 2>/dev/null; then
              echo "SYNTAX ERROR: $file"
              failed=1
            fi
          done < <(find ywai/setup -name '*.ps1' -not -path '*/node_modules/*' -print0)
          exit $failed

  config-integrity:
    name: Config Integrity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate opencode config JSON
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          path = Path("ywai/config/opencode.json")
          data = json.loads(path.read_text())
          assert "permission" in data, "permission config missing"
          assert "mcp" in data, "mcp config missing"
          assert "engram" in data["mcp"], "engram mcp missing"
          assert "context7" in data["mcp"], "context7 mcp missing"
          print(f"{path} OK")
          PY

      - name: Validate types.json structure
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          path = Path("ywai/types/types.json")
          data = json.loads(path.read_text())
          required = {"generic", "nest", "nest-angular", "nest-react", "python", "dotnet", "devops"}
          actual = set(data.get("types", {}).keys())
          missing = sorted(required - actual)
          assert not missing, f"missing project types: {missing}"
          print(f"{path} OK")
          PY

  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Test setup wizard
        run: |
          cd ywai/setup/wizard
          GOCACHE=/tmp/go-build-cache go test ./...

      - name: Test GA
        run: |
          cd ywai/ga
          GOCACHE=/tmp/go-build-cache go test ./...

      - name: Test repo suite
        run: |
          cd ywai/tests
          GOCACHE=/tmp/go-build-cache go test ./...
