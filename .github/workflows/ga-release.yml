name: GA Release

on:
  release:
    types: [published]

jobs:
  download-release:
    name: Download Release
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Download release assets
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          mkdir -p ~/.local/bin

          # Retry with backoff: the Release workflow (push on tag) uploads
          # these binaries. If this workflow fires before uploads finish
          # (race condition on manually-created releases), wait and retry
          # instead of failing immediately.
          download_with_retry() {
            local url="$1"
            local out="$2"
            local max_attempts=12
            local delay=10
            for attempt in $(seq 1 "$max_attempts"); do
              if curl -fsSL -o "$out" "$url"; then
                return 0
              fi
              echo "  attempt ${attempt}/${max_attempts} failed, retrying in ${delay}s..."
              sleep "$delay"
            done
            echo "ERROR: gave up after ${max_attempts} attempts on ${url}"
            return 1
          }

          # Download all platform binaries
          for asset in ga-darwin-amd64 ga-darwin-arm64 ga-linux-amd64 ga-linux-arm64 ga-windows-amd64.exe; do
            URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${asset}"
            echo "Downloading ${asset}..."
            download_with_retry "$URL" "$HOME/.local/bin/${asset}"
          done
          
          # Rename for convenience
          cd ~/.local/bin
          if [ -f ga-darwin-amd64 ]; then
            if [ "$(uname)" = "Darwin" ]; then
              cp ga-darwin-amd64 ga
              chmod +x ga
            fi
          elif [ -f ga-linux-amd64 ]; then
            if [ "$(uname)" = "Linux" ]; then
              cp ga-linux-amd64 ga
              chmod +x ga
            fi
          elif [ -f ga-windows-amd64.exe ]; then
            if [ "$(uname)" = "Windows" ]; then
              cp ga-windows-amd64.exe ga.exe
            fi
          fi
          
          ls -la ~/.local/bin/

      - name: Verify ga works
        run: ~/.local/bin/ga --version || echo "Binary not for this platform"

  test-release:
    name: Test Release
    needs: download-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download GA
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/ga-linux-amd64"
          for attempt in $(seq 1 12); do
            if curl -fsSL -o ga "$URL"; then
              break
            fi
            echo "  attempt ${attempt}/12 failed, retrying in 10s..."
            sleep 10
          done
          chmod +x ga

      - name: Test GA
        run: |
          ./ga --version
          ./ga --help
